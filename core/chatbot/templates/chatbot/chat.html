<h2>AI Health Chatbot 🤖</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="message" placeholder="Ask about diet, health..." style="width:300px;" required>
    <button type="submit">Send</button>
</form>

<br>

<div style="border:1px solid black; padding:10px; width:400px;">
    <b>Bot:</b> {{ response }}
</div>

<br>
<a href="{% url dashboard %}">Back to Dashboard</a>
