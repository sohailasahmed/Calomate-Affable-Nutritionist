<h2>Dashboard</h2>

<h3>Total Calories: {{ total_calories }}</h3>

<table border="1">
    <tr>
        <th>Food</th>
        <th>Quantity</th>
        <th>Calories</th>
    </tr>

    {% for meal in meals %}
    <tr>
        <td>{{ meal.food.name }}</td>
        <td>{{ meal.quantity }}</td>
        <td>{{ meal.total_calories }}</td>
    </tr>
    {% endfor %}
</table>

<br>

<a href="/add-meal/">Add Meal</a>
<a href="/chat/">Go to Chatbot</a>

<hr>

<h2>Calories Chart</h2>

<canvas id="myChart" width="400" height="200"></canvas>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>
    const labels = JSON.parse('{{ food_names|escapejs }}');
    const data = JSON.parse('{{ calories|escapejs }}');

    const ctx = document.getElementById('myChart').getContext('2d');

    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Calories',
                data: data
            }]
        }
    });
</script>
