<!DOCTYPE html>
<html>
<head>
    <title>Calomate</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand" href="/">Calomate</a>

    <div>
      {% if user.is_authenticated %}
        <a class="btn btn-outline-light me-2" href="/home/">Home</a>
        <a class="btn btn-outline-light me-2" href="/diet/dashboard/">Dashboard</a>
        <a class="btn btn-outline-light me-2" href="/diet/add-meal/">Add Meal</a>
        <a class="btn btn-outline-light me-2" href="/chat/">Chatbot</a>
        <a class="btn btn-danger" href="/logout/">Logout</a>
      {% else %}
        <a class="btn btn-outline-light me-2" href="/login/">Login</a>
        <a class="btn btn-success" href="/register/">Register</a>
      {% endif %}
    </div>
  </div>
</nav>

<div class="container mt-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
