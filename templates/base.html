<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calomate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--bg:#f8fafc;
--bg2:#eef2ff;
--text:#0f172a;
--muted:#0f0627;

--card:rgba(255,255,255,.75);
--border:rgba(255,255,255,.45);

--blue:#2563eb;
--green:#16a34a;
--amber:#f59e0b;
--red:#ef4444;

--shadow:0 10px 30px rgba(0,0,0,.08);
}

body{
font-family:'Inter',sans-serif;
background:
radial-gradient(circle at top left,#dbeafe 0%,transparent 30%),
radial-gradient(circle at top right,#e9d5ff 0%,transparent 25%),
linear-gradient(180deg,var(--bg),var(--bg2));
color:var(--text);
min-height:100vh;
transition:.3s ease;
}

.container,.container-fluid{
max-width:1280px;
}

h1,h2,h3,h4,h5,h6{
font-weight:800;
letter-spacing:-0.3px;
}

p,small,label,span,li,strong{
color:var(--muted);
font-weight:500;
}

/* NAVBAR */

.navbar-custom{
position:sticky;
top:0;
z-index:999;
backdrop-filter:blur(18px);
background:rgba(15,23,42,.82);
border-bottom:1px solid rgba(255,255,255,.08);
}

.navbar-brand{
font-size:1.35rem;
letter-spacing:.5px;
}

/* BUTTONS */

.btn{
border-radius:14px;
padding:10px 18px;
font-weight:700;
transition:.25s ease;
}

.btn:hover{
transform:translateY(-2px);
}

.btn-success{background:var(--green);border:none;}
.btn-danger{background:var(--red);border:none;}
.btn-warning{background:var(--amber);border:none;}
.btn-primary{background:var(--blue);border:none;}

.btn-outline-light{
border:1px solid rgba(78, 68, 68, 0.951);
}

/* CARD */

.card{
border:none;
border-radius:24px;
background:var(--card);
backdrop-filter:blur(14px);
box-shadow:var(--shadow);
transition:.25s ease;
overflow:hidden;
}

.card:hover{
transform:translateY(-3px);
box-shadow:0 18px 38px rgba(0,0,0,.12);
}

/* FORM */

.form-control,.form-select{
border-radius:14px;
padding:12px 14px;
border:1px solid #dbe2ea;
box-shadow:none !important;
}

.form-control:focus,
.form-select:focus{
border-color:#60a5fa;
}

/* PROFILE IMAGE */

.profile-pic{
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,.8);
box-shadow:0 4px 14px rgba(0,0,0,.12);
}

/* TABLE */

table{
border-radius:16px;
overflow:hidden;
}

table th{
background:#f1f5f9;
color:#0f172a;
font-weight:700;
}

table td{
vertical-align:middle;
}

/* PROGRESS */

.progress{
height:12px;
border-radius:20px;
background:#e2e8f0;
overflow:hidden;
}

.progress-bar{
border-radius:20px;
}

/* DARK MODE */

body.dark-mode{
--bg:#020617;
--bg2:#0f172a;
--text:#f8fafc;
--muted:#cbd5e1;

--card:rgba(15,23,42,.75);
--border:rgba(255,255,255,.05);

--shadow:0 12px 28px rgba(0,0,0,.45);
}

body.dark-mode .navbar-custom{
background:rgba(2,6,23,.85);
}

body.dark-mode .a-custom{
color: #fff;
border-color: #fff;
}


body.dark-mode .card{
background:rgba(15,23,42,.78);
}

body.dark-mode table th{
background:#1e293b;
color:#fff;
}

body.dark-mode table td{
background:transparent;
color:#fff;
border-color:#334155;
}

body.dark-mode .form-control,
body.dark-mode .form-select{
background:#0f172a;
color:#fff;
border-color:#334155;
}

body.dark-mode .form-control::placeholder{
color:#94a3b8;
}

body.dark-mode,
body.dark-mode p,
body.dark-mode span,
body.dark-mode small,
body.dark-mode li,
body.dark-mode label,
body.dark-mode td,
body.dark-mode th,
body.dark-mode div,
body.dark-mode strong {
    color:#f8fafc !important;
    font-weight:600;
}

body.dark-mode h1,
body.dark-mode h2,
body.dark-mode h3,
body.dark-mode h4,
body.dark-mode h5,
body.dark-mode h6{
    color:white !important;
    font-weight:700;
}

body.dark-mode input,
body.dark-mode textarea,
body.dark-mode select{
    background:#1e293b !important;
    color:white !important;
    border:1px solid #475569 !important;
}

body.dark-mode ::placeholder{
    color:#cbd5e1 !important;
}

/* FOOTER */

.footer{
padding:30px 0;
text-align:center;
color:var(--muted);
font-size:.95rem;
}

/* MOBILE */

@media(max-width:768px){

.navbar-brand{
font-size:1.1rem;
}

.btn{
padding:8px 14px;
font-size:.92rem;
}

.card{
border-radius:20px;
}

}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm">
<div class="container">

<a class="navbar-brand fw-bold" href="/">🍎 Calomate</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">

<div class="ms-auto d-flex align-items-center flex-wrap gap-2 mt-3 mt-lg-0">

{% if user.is_authenticated %}

<a class="btn btn-outline-light" href="/home/">Home</a>
<a class="btn btn-outline-light" href="/diet/dashboard/">Dashboard</a>
<a class="btn btn-outline-light" href="/diet/add-meal/">Add Meal</a>
<a class="btn btn-outline-light" href="/chat/">AI Coach</a>

<a href="{% url 'account' %}" class="text-decoration-none">
{% if user.userprofile.profile_pic %}
<img src="{{ user.userprofile.profile_pic.url }}" width="40" height="40" class="profile-pic">
{% else %}
<img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" width="40" height="40" class="profile-pic">
{% endif %}
</a>

<button onclick="toggleTheme()" class="btn btn-warning" id="themeBtn">
🌙
</button>

<form method="POST" action="/logout/" style="display:inline;">
{% csrf_token %}
<button class="btn btn-danger">Logout</button>
</form>

{% else %}

<a class="btn btn-outline-light" href="/login/">Login</a>
<a class="btn btn-success" href="/register/">Get Started</a>

{% endif %}

</div>
</div>
</div>
</nav>

<div class="container mt-4 mb-5">
{% block content %}
{% endblock %}
</div>

<div class="footer">
Calomate © 2026 • Smart Nutrition & Fitness Assistant
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function applyTheme(mode){
const body=document.body;
const btn=document.getElementById("themeBtn");

if(mode==="dark"){
body.classList.add("dark-mode");
if(btn) btn.innerHTML="☀️";
}else{
body.classList.remove("dark-mode");
if(btn) btn.innerHTML="🌙";
}
}

function toggleTheme(){
    const dark = document.body.classList.contains("dark-mode");
    const next = dark ? "light" : "dark";
    localStorage.setItem("theme", next);
    applyTheme(next);
    location.reload();
}

document.addEventListener("DOMContentLoaded",function(){
const saved=localStorage.getItem("theme") || "light";
applyTheme(saved);


});
</script>

<script>
document.addEventListener("DOMContentLoaded", function () {
    document.querySelectorAll(".progress-bar[data-width]").forEach(function(el){
        el.style.width = el.dataset.width + "%";
    });
});
</script>

<script>
function chartTextColor(){
    return document.body.classList.contains("dark-mode")
        ? "#ffffff"
        : "#111827";
}
</script>

</body>
</html>
