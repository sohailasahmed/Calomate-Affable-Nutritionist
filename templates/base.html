<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Calomate</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root{
    --bg:#f5f7fb;
    --bg2:#eef2f7;
    --text:#111827;
    --muted:#0f141a;

    --card:#ffffff;
    --card2:#f9fafb;

    --border:#e5e7eb;

    --nav:#111827;

    --blue:#2563eb;
    --green:#16a34a;
    --amber:#f59e0b;
    --red:#ef4444;

    --shadow:0 10px 24px rgba(15,23,42,.08);
}

/* GLOBAL */

body{
    background:linear-gradient(180deg,var(--bg),var(--bg2));
    color:var(--text);
    min-height:100vh;
    transition:.25s ease;
}

.container,.container-fluid{
    max-width:1280px;
}

h1,h2,h3,h4,h5,h6{
    color:var(--text);
    font-weight:700;
}

h1,h2,h3,h4,h5,h6{
    letter-spacing:.2px;
}

.card h5,
.card h6,
.card small{
    font-weight:700;
}

small,p,li,label,span,strong{
    color:var(--muted);
    font-weight:500;
    letter-spacing:.2px;
}

/* NAVBAR */

.navbar-custom{
    background:rgba(17,24,39,.94);
    backdrop-filter:blur(10px);
}

/* CARD */

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:18px;
    box-shadow:var(--shadow);
    transition:.25s ease;
}

.card:hover{
    transform:translateY(-2px);
    box-shadow:0 18px 34px rgba(0,0,0,.10);
}

/* BUTTONS */

.btn{
    border-radius:12px;
    font-weight:600;
}

.btn-success{ background:var(--green); border:none; }
.btn-danger{ background:var(--red); border:none; }
.btn-warning{ background:var(--amber); border:none; }

.btn-outline-light{
    border-color:rgba(255,255,255,.5);
}

/* TABLE */

table{
    border-radius:12px;
    overflow:hidden;
}

table th{
    background:#f3f4f6;
    color:#111827;
}

table td{
    color:#111827;
}

/* PROFILE */

img.profile-pic{
    border-radius:50%;
    object-fit:cover;
    border:2px solid rgba(255,255,255,.8);
}

/* DARK MODE */

body.dark-mode{
    --bg:#0b1220;
    --bg2:#111827;
    --text:#f8fafc;
    --muted:#cbd5e1;

    --card:#162033;
    --card2:#1e293b;

    --border:#2a3447;

    --nav:#050814;

    --shadow:0 16px 34px rgba(0,0,0,.45);
}

body.dark-mode .navbar-custom{
    background:rgba(5,8,20,.92);
}

body.dark-mode .card{
    background:linear-gradient(180deg,#162033,#111827);
}

body.dark-mode .btn-outline-light{
    color:#e5e7eb;
    border-color:#64748b;
}

body.dark-mode .btn-outline-light:hover{
    background:#e5e7eb;
    color:#111827;
}

/* DARK TABLE FIX */

body.dark-mode table{
    background:#111827 !important;
}

body.dark-mode table th{
    background:#1e293b !important;
    color:#f8fafc !important;
}

body.dark-mode table td{
    background:#111827 !important;
    color:#f8fafc !important;
    border-color:#334155 !important;
}

/* CHARTS */

canvas{
    filter:saturate(1.08) contrast(1.04);
}

body.dark-mode canvas{
    filter:brightness(1.08) saturate(1.12) contrast(1.08);
}

body.dark-mode .chart-label,
body.dark-mode .legend-label{
    color:#f8fafc !important;
}

</style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow">
<div class="container">

<a class="navbar-brand fw-bold" href="/">Calomate</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navMenu">

<div class="ms-auto d-flex align-items-center flex-wrap gap-2">


{% if user.is_authenticated %}

<a class="btn btn-outline-light" href="/home/">Home</a>
<a class="btn btn-outline-light" href="/diet/dashboard/">Dashboard</a>
<a class="btn btn-outline-light" href="/diet/add-meal/">Add Meal</a>
<a class="btn btn-outline-light" href="/chat/">Chatbot</a>

<a href="{% url 'account' %}" class="text-decoration-none">

{% if user.userprofile.profile_pic %}
<img src="{{ user.userprofile.profile_pic.url }}" width="36" height="36" class="profile-pic">
{% else %}
<img src="https://cdn-icons-png.flaticon.com/512/847/847969.png" width="36" height="36" class="profile-pic">
{% endif %}

</a>

<button onclick="toggleTheme()" class="btn  theme-btn" id="themeBtn">
🌙
</button>


<form method="POST" action="/logout/" style="display:inline;">
{% csrf_token %}
<button class="btn btn-danger">Logout</button>
</form>

{% else %}

<a class="btn btn-outline-light" href="/login/">Login</a>
<a class="btn btn-success" href="/register/">Register</a>

{% endif %}

</div>
</div>

</div>
</nav>

<div class="container mt-4">
{% block content %}
{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
function applyTheme(mode){
    const body = document.body;
    const btn = document.getElementById("themeBtn");

    if(mode === "dark"){
        body.classList.add("dark-mode");
        if(btn) btn.innerHTML = "☀️";
    }else{
        body.classList.remove("dark-mode");
        if(btn) btn.innerHTML = "🌙";
    }
}

function toggleTheme(){
    const dark = document.body.classList.contains("dark-mode");
    const next = dark ? "light" : "dark";
    localStorage.setItem("theme", next);
    applyTheme(next);
}

document.addEventListener("DOMContentLoaded", function(){
    const saved = localStorage.getItem("theme") || "light";
    applyTheme(saved);
});
</script>

</body>
</html>
